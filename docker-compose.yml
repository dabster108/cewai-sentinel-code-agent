services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: sentinel-backend
    env_file:
      - .env
    environment:
      - MAX_UPLOAD_BYTES=200000
      - MAX_FILES=10
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health-check')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend/sentinel-agent
      dockerfile: Dockerfile
    container_name: sentinel-frontend
    environment:
      - NEXT_PUBLIC_API_BASE=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
