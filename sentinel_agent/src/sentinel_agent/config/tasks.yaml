analyze_security_task:
  description: >
    Analyze the following Python source code files and detect security
    vulnerabilities including SQL injection, command injection, path traversal,
    unsafe deserialization, weak authentication, hardcoded secrets and API keys,
    input validation issues, and dangerous API usage.

    Each file is clearly marked with FILE: and PATH: headers.
    For each vulnerability found, specify the exact file name and provide
    the line numbers or relevant code snippet.

    Source code to analyze:
    {source_code}
  expected_output: >
    Return concise markdown with at most 6 highest-impact findings total.
    For each finding include only:
    - File name
    - Vulnerability type
    - Severity level (Critical/High/Medium/Low)
    - Minimal code snippet (1-3 lines)
    - One-line recommended fix
    Do not include introductions or extra commentary.
  agent: security_agent

analyze_quality_task:
  description: >
    Review the following Python source code files for coding best practices violations,
    anti-patterns, missing type hints, poor structure,
    unused imports, and performance issues.

    Each file is clearly marked with FILE: and PATH: headers.
    For each quality issue found, specify the exact file name and provide
    the line numbers or relevant code snippet.

    Source code to analyze:
    {source_code}
  expected_output: >
    Return concise markdown with at most 6 most important quality issues total.
    For each issue include only:
    - File name
    - Issue category
    - Priority (High/Medium/Low)
    - Minimal snippet (1-3 lines)
    - One-line suggested improvement
    Do not include introductions or extra commentary.
  agent: quality_agent

generate_report_task:
  description: >
    Combine outputs from the security and quality analysis tasks
    and generate a final professional report.

    The report should be well-organized by file, making it easy to
    see which issues belong to which file. Include:
    - Executive summary with total counts
    - Issues grouped by file
    - Severity/priority breakdown
    - Clear actionable recommendations
  expected_output: >
    A compact markdown report under 220 lines with:
    - Short executive summary (max 6 lines)
    - Findings grouped by file
    - Severity/priority counts
    - Actionable recommendations
    Avoid table of contents and avoid repeating long snippets.
  agent: report_agent

fix_vulnerabilities:
  description: >
    The vulnerability report from the previous task is available in your context.
    It contains a list of vulnerable files and their issues.

    Your job:
    1. Read the report from your context and identify every vulnerable file.
    2. For each vulnerable file, produce the COMPLETE fixed version of the file
       with all vulnerabilities resolved using secure coding practices.
     3. Fix issues such as SQL injection (use parameterized queries),
       command injection, path traversal, unsafe deserialization, weak authentication,
       hardcoded secrets and API keys (use os.environ or a secret manager), and
       other input validation issues.
    4. Do NOT change any code that is not related to the vulnerabilities.

    IMPORTANT: You must output the fixed code for every file using EXACTLY
    this format for each file (including the #### header and code fence):

    #### filename.py
    ```python
    <complete fixed file content here>
    ```

  expected_output: >
    For each vulnerable file, output the complete fixed source code using
    this exact format:

    #### filename.py
    ```python
    <complete fixed file content>
    ```

    After all files, include only a very brief summary (1-3 lines per file).
  agent: code_fixer
